name: selection_hook_flutter
description: "Cross-platform text selection monitoring via FFI for Flutter desktop applications."
version: 0.1.0
homepage: https://github.com/leszek3737/selection-hook-flutter
repository: https://github.com/leszek3737/selection-hook-flutter
issue_tracker: https://github.com/leszek3737/selection-hook-flutter/issues
topics:
  - ffi
  - desktop
  - selection
  - clipboard
  - accessibility

environment:
  sdk: ^3.12.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3

dev_dependencies:
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
